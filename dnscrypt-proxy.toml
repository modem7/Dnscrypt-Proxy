###############################################################################
#                        Servers with known bugs                               #
###############################################################################

[broken_implementations]

# Cisco servers currently cannot handle queries larger than 1472 bytes, and don't
# truncate responses larger than questions as expected by the DNSCrypt protocol.
# This prevents large responses from being received over UDP and over relays.
#
# Older versions of the `dnsdist` server software had a bug with queries larger
# than 1500 bytes. This is fixed since `dnsdist` version 1.5.0, but
# some servers may still run an outdated version.
#
# The list below enables workarounds to make non-relayed usage more reliable
# until the servers are fixed.

fragments_blocked = ['cisco', 'cisco-ipv6', 'cisco-familyshield', 'cisco-familyshield-ipv6', 'cisco-sandbox', 'cleanbrowsing-adult', 'cleanbrowsing-adult-ipv6', 'cleanbrowsing-family', 'cleanbrowsing-family-ipv6', 'cleanbrowsing-security', 'cleanbrowsing-security-ipv6']


###############################################################################
#                Certificate-based client authentication for DoH               #
###############################################################################

# Use a X509 certificate to authenticate yourself when connecting to DoH servers.
# This is only useful if you are operating your own, private DoH server(s).
# 'creds' maps servers to certificates, and supports multiple entries.
# If you are not using the standard root CA, an optional "root_ca"
# property set to the path to a root CRT file can be added to a server entry.

[doh_client_x509_auth]

#
# creds = [
#    { server_name='*', client_cert='client.crt', client_key='client.key' }
# ]


###############################################################################
#                          Anonymized DNS                                      #
###############################################################################

[anonymized_dns]

## Routes are indirect ways to reach DNSCrypt servers.
##
## A route maps a server name ("server_name") to one or more relays that will be
## used to connect to that server.
##
## A relay can be specified as a DNS Stamp (either a relay stamp, or a
## DNSCrypt stamp) or a server name.
##
## The following example routes "example-server-1" via `anon-example-1` or `anon-example-2`,
## and "example-server-2" via the relay whose relay DNS stamp is
## "sdns://gRIxMzcuNzQuMjIzLjIzNDo0NDM".
##
## !!! THESE ARE JUST EXAMPLES !!!
##
## Review the list of available relays from the "relays.md" file, and, for each
## server you want to use, define the relays you want connections to go through.
##
## Carefully choose relays and servers so that they are run by different entities.
##
## "server_name" can also be set to "*" to define a default route, for all servers:
## { server_name='*', via=['anon-example-1', 'anon-example-2'] }
##
## If a route is ["*"], the proxy automatically picks a relay on a distinct network.
## { server_name='*', via=['*'] } is also an option, but is likely to be suboptimal.
##
## Manual selection is always recommended over automatic selection, so that you can
## select (relay,server) pairs that work well and fit your own criteria (close by or
## in different countries, operated by different entities, on distinct ISPs...)

# routes = [
#    { server_name='example-server-1', via=['anon-example-1', 'anon-example-2'] },
#    { server_name='example-server-2', via=['sdns://gRIxMzcuNzQuMjIzLjIzNDo0NDM'] }
# ]

routes = [
    { server_name='*', via=['anon-dnscrypt.uk-ipv4', 'anon-v.dnscrypt.uk-ipv4', 'anon-cs-de2', 'anon-cs-fr'] }
#     { server_name='*', via=['*'] }
]


# Skip resolvers incompatible with anonymization instead of using them directly
#
# Kept `true` deliberately, unlike the upstream example default of `false`:
# every server is routed via the relays above, so a resolver that can't be
# anonymized should be skipped rather than silently contacted directly.

skip_incompatible = true


# If public server certificates for a non-conformant server cannot be
# retrieved via a relay, try getting them directly. Actual queries
# will then always go through relays.

# direct_cert_fallback = false


###############################################################################
#                                 DNS64                                        #
###############################################################################

## DNS64 is a mechanism for synthesizing AAAA records from A records.
## It is used with an IPv6/IPv4 translator to enable client-server
## communication between an IPv6-only client and an IPv4-only server,
## without requiring any changes to either the IPv6 or the IPv4 node,
## for the class of applications that work through NATs.
##
## There are two options to synthesize such records:
## Option 1: Using a set of static IPv6 prefixes;
## Option 2: By discovering the IPv6 prefix from DNS64-enabled resolver.
##
## If both options are configured - only static prefixes are used.
## (Ref. RFC6147, RFC6052, RFC7050)
##
## Do not enable unless you know what DNS64 is and why you need it, or else
## you won't be able to connect to anything at all.

[dns64]

## (Option 1) Static prefix(es) as Pref64::/n CIDRs.
# prefix = ['64:ff9b::/96']

## (Option 2) DNS64-enabled resolver(s) to discover Pref64::/n CIDRs.
## These resolvers are used to query for Well-Known IPv4-only Name (WKN) "ipv4only.arpa." to discover only.
## Set with your ISP's resolvers in case of custom prefixes (other than Well-Known Prefix 64:ff9b::/96).
## IMPORTANT: Default resolvers listed below support Well-Known Prefix 64:ff9b::/96 only.
# resolver = ['[2606:4700:4700::64]:53', '[2001:4860:4860::64]:53']


###############################################################################
#                           IP Encryption                                      #
###############################################################################

[ip_encryption]

## Encrypt client IP addresses in plugin logs using IPCrypt.
## No effect while query/nx/blocked-names logging above is unused (the
## defaults). Left off (matching upstream's own default) since there's
## nothing here to encrypt yet - enable if you turn on query logging.
##
## Templated from the IP_ENCRYPTION_ALGORITHM environment variable.
## One of: none, ipcrypt-deterministic, ipcrypt-nd, ipcrypt-ndx, ipcrypt-pfx

algorithm = "%%IP_ENCRYPTION_ALGORITHM%%"

## Encryption key in hexadecimal format (required if algorithm is not "none").
## Templated from the IP_ENCRYPTION_KEY environment variable - never bake a
## real key into an image layer.

key = "%%IP_ENCRYPTION_KEY%%"


###############################################################################
#                            Monitoring UI                                     #
###############################################################################

[monitoring_ui]

## Enable the monitoring UI.
## Templated from the MONITORING_UI_ENABLED environment variable (must be
## exactly `true` or `false`). Off by default, matching upstream.

enabled = %%MONITORING_UI_ENABLED%%

## Listen address for the monitoring UI.
## Templated from the MONITORING_UI_LISTEN_ADDRESS environment variable.
## Left on loopback by default - not reachable outside the container unless
## you also publish this port.

listen_address = "%%MONITORING_UI_LISTEN_ADDRESS%%"

## Username and password for basic authentication.
## Templated from MONITORING_UI_USERNAME / MONITORING_UI_PASSWORD.
## To disable authentication, set MONITORING_UI_USERNAME to an empty string.
##
## IMPORTANT: if you set MONITORING_UI_ENABLED=true, also set
## MONITORING_UI_PASSWORD to something other than the default - see the
## README's environment variable table.

username = "%%MONITORING_UI_USERNAME%%"
password = "%%MONITORING_UI_PASSWORD%%"

## Optional TLS certificate and key for HTTPS
## If both are empty, HTTP will be used
tls_certificate = ""
tls_key = ""

## Enable query logging in the monitoring UI
## This will show recent queries in the UI
enable_query_log = true

## Privacy level for the monitoring UI
## 0: show all details including client IPs
## 1: anonymize client IPs (default)
## 2: aggregate data only (no individual queries or domains shown)
privacy_level = 1

## Maximum number of recent query log entries to keep in memory
## Helps control memory usage on high-traffic servers
# max_query_log_entries = 100

## Maximum memory usage in MB for recent query logs
# max_memory_mb = 1

## Enable Prometheus metrics endpoint.
## Templated from the MONITORING_UI_PROMETHEUS_ENABLED environment variable.

prometheus_enabled = %%MONITORING_UI_PROMETHEUS_ENABLED%%

## Path for Prometheus metrics endpoint
# prometheus_path = "/metrics"


