when:
  - event: push
    branch: master
    path:
      # Scoped to what actually gets COPYed into the image in the Dockerfile —
      # docs/CI-only changes elsewhere shouldn't trigger a rebuild/republish.
      # (path conditions only apply to push/pull_request events anyway, so
      # this has no effect on the manual trigger below.)
      include:
        - Dockerfile
        - dnscrypt-proxy.toml
        - root/**
        - .woodpecker.yml
  # No branch restriction here (unlike push above) - lets you manually
  # trigger a build against any branch, e.g. to verify a fix on its PR
  # branch before merging, not just against master.
  - event: manual

steps:
  - name: lint-dockerfile
    image: hadolint/hadolint:latest-alpine
    commands:
      - hadolint --version
      - hadolint Dockerfile

  # Writes a .tags file (one tag per line) for build-and-push to pick up via
  # tags_file below - the plugin has no "release on latest + parsed version"
  # feature of its own, but does read an arbitrary file of newline-separated
  # tags at build time. Same branch/secrets scoping as build-and-push, since
  # it exists solely to feed that step.
  - name: compute-tags
    image: alpine:edge
    depends_on: [lint-dockerfile]
    when:
      - branch: master
    commands:
      - |
        version=$(grep -oE "dnscrypt-proxy=[0-9]+\.[0-9]+\.[0-9]+" Dockerfile | cut -d= -f2)
        [ -n "$version" ] || { echo "Could not extract dnscrypt-proxy version from Dockerfile" >&2; exit 1; }
        printf 'latest\n%s\n' "$version" > .tags
        cat .tags

  # Only runs on master (push or manual) - this is the one step with real
  # secrets (Docker Hub credentials), so it must not run for a manual
  # trigger against an arbitrary branch. See build-only below for that case.
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [lint-dockerfile, compute-tags]
    when:
      - branch: master
    settings:
      # Not ${CI_REPO}: it mirrors the GitHub repo's exact casing
      # (modem7/Dnscrypt-Proxy), but Docker Hub repository names must be
      # lowercase - this is the actual published image name.
      repo: modem7/dnscrypt-proxy
      dockerfile: Dockerfile
      purge: true
      compress: true
      build_args:
        BUILDKIT_INLINE_CACHE: "1"
      cache_from:
        - type=registry\,ref=modem7/dnscrypt-proxy:latest
      platforms: linux/amd64,linux/arm64/v8
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      # Read from the .tags file compute-tags wrote (latest + the pinned
      # dnscrypt-proxy version, e.g. 2.1.16) rather than a static tags: value.
      tags_file: .tags

  # Runs for manual triggers on anything other than master - validates the
  # Dockerfile actually builds and the tag is well-formed (exactly the class
  # of bug PR #33 fixed) without ever touching Docker Hub credentials. No
  # username/password/platforms settings here on purpose: this step must
  # stay usable for a manual run against an untrusted or unreviewed branch.
  - name: build-only
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [lint-dockerfile]
    when:
      - branch:
          exclude: [master]
    settings:
      dry-run: true
      repo: modem7/dnscrypt-proxy
      dockerfile: Dockerfile
      tags: latest

  - name: pushrm-dockerhub
    image: chko/docker-pushrm
    depends_on:
      - build-and-push
    environment:
      DOCKER_USER:
        from_secret: docker_username
      DOCKER_PASS:
        from_secret: docker_password
      PUSHRM_FILE: README.md
      PUSHRM_SHORT: A DNS server container using several uk/european DoH resolution services via dnscrypt proxy
      PUSHRM_TARGET: modem7/dnscrypt-proxy
    when:
      - status: [success]

  - name: notify-slack-success
    image: ghcr.io/modem7/woodpecker-slack:latest
    pull: true
    depends_on:
      - build-and-push
    settings:
      status: success
      description: dnscrypt-proxy build
      webhook:
        from_secret: slack_hook
    when:
      - status: [success]

  - name: notify-slack-failure
    image: ghcr.io/modem7/woodpecker-slack:latest
    pull: true
    depends_on:
      - build-and-push
    settings:
      status: failure
      description: dnscrypt-proxy build
      webhook:
        from_secret: slack_hook
    when:
      - status: [failure]
