name: Test image

on:
  push:
    branches:
      - master
    paths:
      - Dockerfile
      - dnscrypt-proxy.toml
      - root/**
      - .github/workflows/test.yml
  pull_request:
    paths:
      - Dockerfile
      - dnscrypt-proxy.toml
      - root/**
      - .github/workflows/test.yml
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------
  # Fast, cheap checks first - fail quickly on the easy stuff before
  # spending time on the Docker build.
  # ---------------------------------------------------------------------

  toml-lint:
    name: Validate dnscrypt-proxy.toml syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Parse TOML
        run: |
          pip install --quiet --break-system-packages toml
          # %%PLACEHOLDER%% tokens are substituted by the init-dnscrypt-config
          # oneshot at container start (see root/etc/s6-overlay/scripts/) - the
          # raw file isn't valid TOML until they're filled in, so mirror the
          # same defaults that script uses.
          sed \
              -e 's/%%LOG_LEVEL%%/2/' \
              -e 's/%%PORT%%/53/' \
              -e 's/%%MAX_CLIENTS%%/1000/' \
              -e 's/%%CACHE_SIZE%%/8192/' \
              -e 's/%%CACHE_ENABLED%%/true/' \
              -e 's/%%CACHE_MIN_TTL%%/2400/' \
              -e 's/%%IP_ENCRYPTION_ALGORITHM%%/none/' \
              -e 's/%%IP_ENCRYPTION_KEY%%//' \
              -e 's/%%MONITORING_UI_ENABLED%%/false/' \
              -e 's#%%MONITORING_UI_LISTEN_ADDRESS%%#127.0.0.1:8080#' \
              -e 's/%%MONITORING_UI_USERNAME%%/admin/' \
              -e 's/%%MONITORING_UI_PASSWORD%%/changeme/' \
              -e 's/%%MONITORING_UI_PROMETHEUS_ENABLED%%/false/' \
              dnscrypt-proxy.toml > /tmp/rendered.toml
          python3 -c "import toml; toml.load(open('/tmp/rendered.toml'))"

  hadolint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jbergstroem/hadolint-gh-action@v1
        with:
          dockerfile: Dockerfile

  # ---------------------------------------------------------------------
  # Build + behavioral smoke test - most expensive, most likely to catch
  # packaging issues (broken apk pins, bad COPY paths, s6 misconfiguration)
  # that the checks above can't see.
  # ---------------------------------------------------------------------

  test:
    name: Docker build + smoke test
    runs-on: ubuntu-latest
    needs: [toml-lint, hadolint]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: dnscrypt-proxy:test
          cache-from: type=gha,scope=test
          cache-to: type=gha,mode=max,scope=test

      - name: Save image for vulnerability scanning
        run: docker save -o /tmp/image.tar dnscrypt-proxy:test
      - name: Scan image for known vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: /tmp/image.tar
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          # Only fail on vulnerabilities that actually have a fix available -
          # failing CI over a disclosed-but-unpatched upstream CVE would be
          # unactionable, not protective.
          ignore-unfixed: true
      - name: Upload scan results to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Start container
        run: |
          docker run -d --name dnscrypt -e LOG_LEVEL=0 \
            -p 127.0.0.1:5353:53/udp -p 127.0.0.1:5353:53/tcp \
            dnscrypt-proxy:test

      - name: Check container runs as non-root
        run: |
          docker exec dnscrypt whoami | grep -qv root
          [ "$(docker exec dnscrypt id -u)" != "0" ]

      - name: Check no world-writable files under /etc/dnscrypt-proxy
        run: |
          count=$(docker exec dnscrypt find /etc/dnscrypt-proxy -type f -perm /o+w | wc -l)
          [ "$count" -eq 0 ]

      - name: Check LOG_LEVEL env var is templated into the config by the init oneshot
        run: docker exec dnscrypt grep -q '^log_level = 0$' /etc/dnscrypt-proxy/dnscrypt-proxy.toml

      # The bootstrap resolvers in dnscrypt-proxy.toml (chosen for their no-log
      # policy, not for speed) are consistently slow or unreachable from GitHub
      # Actions' network - the full source-fetch fallback chain has taken up to
      # ~4 minutes in practice. Budget generously rather than flake on that.
      - name: Wait for container to become healthy
        run: |
          for i in $(seq 1 90); do
            status=$(docker inspect -f '{{.State.Health.Status}}' dnscrypt 2>/dev/null || echo starting)
            [ "$status" = "healthy" ] && exit 0
            sleep 5
          done
          docker logs dnscrypt
          exit 1

      # Deliberately run after the healthy-wait above, not before: the main
      # dnscrypt-proxy process (started by `docker run` above) already fetched
      # and cached the resolver/relay sources to reach "healthy", so this
      # -check invocation reuses that on-disk cache instead of independently
      # repeating the same slow network fetch. Still its own step so a real
      # config regression is distinguishable from the container simply not
      # reaching "healthy" in time.
      - name: Validate config with dnscrypt-proxy -check
        run: |
          timeout 60 docker exec dnscrypt dnscrypt-proxy \
            -config /etc/dnscrypt-proxy/dnscrypt-proxy.toml -check

      - name: Set up dig
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dnsutils

      - name: Resolve a domain over UDP through the proxy
        run: dig @127.0.0.1 -p 5353 one.one.one.one +short +time=5 +tries=2 | grep -qE '^[0-9]+\.'

      - name: Resolve a domain over TCP through the proxy
        run: dig @127.0.0.1 -p 5353 +tcp one.one.one.one +short +time=5 +tries=2 | grep -qE '^[0-9]+\.'

      - name: Stop container
        if: always()
        run: docker rm -f dnscrypt || true
